<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Texta VIP 支付</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="shortcut icon" href="./favicon.svg" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="auth-page">
    <main class="auth-page-wrap">
      <section class="auth-card solo pay-card">
        <div class="auth-brand">Texta VIP</div>
        <p class="auth-subtitle">支付 10 元可升级 VIP（每日 50 次）</p>

        <div class="pay-box">
          <div class="pay-title">收款码</div>
          <div class="pay-qr-placeholder">
            <img id="payQrImage" src="./assets/pay-qr.jpg" alt="收款码占位图" />
          </div>
          <p class="pay-tip">若图片未显示，请按文末路径上传收款码图片。</p>
        </div>

        <div id="payMsg" class="auth-msg"></div>
        <label for="payerName">付款人昵称</label>
        <input id="payerName" type="text" placeholder="例如：张三" />
        <label for="proofCode">支付凭证号（可选）</label>
        <input id="proofCode" type="text" placeholder="例如：订单号/转账单号" />
        <label for="proofImageUrl">凭证图片链接（可选）</label>
        <input id="proofImageUrl" type="text" placeholder="粘贴图片URL，或先留空" />
        <label for="proofNote">备注（可选）</label>
        <input id="proofNote" type="text" placeholder="补充说明" />
        <button id="submitVipRequestBtn" class="primary-btn" type="button">提交支付凭证</button>
        <a class="upgrade-link" href="./app.html">返回主页面</a>
      </section>
    </main>

    <script src="./site-config.js?v=2026.03.25.3"></script>
    <script src="./pay.js?v=2026.03.25.3"></script>
  </body>
</html>
