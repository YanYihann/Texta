<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Texta 用户使用查看</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="shortcut icon" href="./favicon.svg" />
    <link rel="stylesheet" href="./style.css?v=2026.04.11.162500" />
  </head>
  <body class="admin-page">
    <main class="app-shell admin-shell admin-wide-shell">
      <section class="panel result-panel">
        <div class="top-actions">
          <h2>用户使用查看</h2>
          <div class="actions">
            <button id="refreshUsageBtn" type="button">刷新</button>
            <a class="upgrade-link" href="./admin.html">VIP 审核中心</a>
            <a class="upgrade-link" href="./app.html">返回主页面</a>
          </div>
        </div>

        <div class="usage-toolbar">
          <div>
            <label for="usageSearchInput">搜索用户</label>
            <input id="usageSearchInput" type="text" placeholder="输入用户名或邮箱" />
          </div>
          <div>
            <label for="usageRoleFilter">身份筛选</label>
            <select id="usageRoleFilter">
              <option value="all">全部身份</option>
              <option value="admin">管理员</option>
              <option value="vip">VIP 用户</option>
              <option value="user">普通用户</option>
            </select>
          </div>
          <div>
            <label for="usageSortSelect">排序方式</label>
            <select id="usageSortSelect">
              <option value="totalUsage">按总使用次数降序</option>
              <option value="latestUsedAt">按最近使用时间降序</option>
              <option value="createdAt">按用户创建时间降序</option>
            </select>
          </div>
        </div>

        <div id="usageSummaryRow" class="usage-summary-row"></div>
        <p id="usageStatus" class="subtitle">加载中...</p>
        <div id="usageUserList" class="admin-list"></div>
      </section>
    </main>
    <script src="./site-config.js?v=2026.04.07.230500"></script>
    <script src="./admin-usage.js?v=2026.04.07.230500"></script>
  </body>
</html>
